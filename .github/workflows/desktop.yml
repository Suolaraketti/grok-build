name: Desktop app

# Builds downloadable Grok Build Desktop installers (.dmg, .msi/.exe, .deb,
# .AppImage, .rpm) with the grok agent binary bundled inside.
#
# Runs on demand (workflow_dispatch) and on tags shaped like desktop-v*.
# Tag runs additionally publish a draft GitHub release with the bundles.

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    # Intel mac agent+tauri can exceed an hour; fail clearly instead of hanging.
    timeout-minutes: 180
    strategy:
      fail-fast: false
      matrix:
        include:
          # Apple Silicon — native on macos-14
          - os: macos-14
            rust_target: aarch64-apple-darwin
            tauri_args: --target aarch64-apple-darwin
            bundles: desktop/src-tauri/target/aarch64-apple-darwin/release/bundle/dmg/*.dmg
          # Intel macOS — cross-compile from macos-14 (macos-13 retired; macos-15-intel
          # is scarce/slow and previously left tag runs incomplete for hours).
          - os: macos-14
            rust_target: x86_64-apple-darwin
            tauri_args: --target x86_64-apple-darwin
            bundles: desktop/src-tauri/target/x86_64-apple-darwin/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            rust_target: ""
            tauri_args: ""
            bundles: |
              desktop/src-tauri/target/release/bundle/deb/*.deb
              desktop/src-tauri/target/release/bundle/appimage/*.AppImage
              desktop/src-tauri/target/release/bundle/rpm/*.rpm
          - os: windows-latest
            rust_target: ""
            tauri_args: ""
            bundles: |
              desktop/src-tauri/target/release/bundle/msi/*.msi
              desktop/src-tauri/target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    env:
      # True when Apple Developer credentials are configured as repo secrets;
      # gates the signed macOS build path (see desktop/README.md).
      MAC_SIGNING: ${{ secrets.APPLE_SIGNING_IDENTITY != '' }}
      # Avoid crates.io index stalls on cold runners.
      CARGO_REGISTRIES_CRATES_IO_PROTOCOL: sparse

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev patchelf

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          # Match bin/protoc DotSlash pin so CI isn't on an older accidental default.
          version: "29.3"
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      # Force cargo build scripts onto the setup-protoc binary. On Windows the
      # repo's bin/protoc DotSlash wrapper is not a PE image (os error 193).
      - name: Export PROTOC
        shell: bash
        run: |
          PROTOC_PATH="$(command -v protoc)"
          echo "PROTOC=$PROTOC_PATH" >> "$GITHUB_ENV"
          protoc --version

      - uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Add Rust target
        if: matrix.rust_target != ''
        run: rustup target add ${{ matrix.rust_target }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            desktop/src-tauri
          key: desktop-${{ matrix.os }}-${{ matrix.rust_target || 'host' }}

      - name: Build the grok agent binary
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.rust_target }}" ]]; then
            cargo build --release -p xai-grok-pager-bin --target "${{ matrix.rust_target }}"
          else
            cargo build --release -p xai-grok-pager-bin
          fi

      - name: Bundle the agent binary into the app resources
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.rust_target }}" ]]; then
            AGENT_DIR="target/${{ matrix.rust_target }}/release"
          else
            AGENT_DIR="target/release"
          fi
          mkdir -p desktop/src-tauri/resources/bin
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp "$AGENT_DIR/xai-grok-pager.exe" desktop/src-tauri/resources/bin/grok.exe
            test -f desktop/src-tauri/resources/bin/grok.exe
          else
            cp "$AGENT_DIR/xai-grok-pager" desktop/src-tauri/resources/bin/grok
            chmod +x desktop/src-tauri/resources/bin/grok
            test -x desktop/src-tauri/resources/bin/grok
          fi
          ls -la desktop/src-tauri/resources/bin/

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@2.11.4

      # Two build steps so missing Apple secrets can never break the build:
      # empty signing env vars would make Tauri attempt (and fail) signing.
      # Retry: Windows WiX/NSIS and Linux AppImage tooling are fetched at build
      # time and occasionally flake on network/rate limits.
      - name: Build desktop bundles
        if: runner.os != 'macOS' || env.MAC_SIGNING != 'true'
        working-directory: desktop/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          attempt=1
          while true; do
            if [[ -n "${{ matrix.tauri_args }}" ]]; then
              if tauri build ${{ matrix.tauri_args }}; then
                exit 0
              fi
            else
              if tauri build; then
                exit 0
              fi
            fi
            if [[ "$attempt" -ge 3 ]]; then
              echo "tauri build failed after ${attempt} attempts" >&2
              exit 1
            fi
            echo "tauri build failed (attempt ${attempt}); retrying..." >&2
            sleep $((attempt * 30))
            attempt=$((attempt + 1))
          done

      - name: Build desktop bundles (signed + notarized)
        if: runner.os == 'macOS' && env.MAC_SIGNING == 'true'
        working-directory: desktop/src-tauri
        shell: bash
        run: |
          set -euo pipefail
          if [[ -n "${{ matrix.tauri_args }}" ]]; then
            tauri build ${{ matrix.tauri_args }}
          else
            tauri build
          fi
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Verify expected bundles exist
        shell: bash
        run: |
          set -euo pipefail
          shopt -s nullglob
          # matrix.bundles may be multi-line; expand each pattern.
          files=()
          while IFS= read -r pattern; do
            [[ -z "$pattern" ]] && continue
            for f in $pattern; do
              files+=("$f")
            done
          done <<< "${{ matrix.bundles }}"
          if [[ ${#files[@]} -eq 0 ]]; then
            echo "No bundles matched patterns:" >&2
            echo "${{ matrix.bundles }}" >&2
            echo "--- find under desktop/src-tauri/target ---" >&2
            find desktop/src-tauri/target -type f \
              \( -name '*.dmg' -o -name '*.msi' -o -name '*.exe' \
                 -o -name '*.deb' -o -name '*.rpm' -o -name '*.AppImage' \) \
              2>/dev/null | head -80 >&2 || true
            exit 1
          fi
          echo "Bundles to publish:"
          ls -lh "${files[@]}"

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          # rust_target distinguishes the two macos-14 matrix legs.
          name: grok-build-desktop-${{ matrix.os }}-${{ matrix.rust_target || 'host' }}
          path: ${{ matrix.bundles }}
          if-no-files-found: error

  release:
    needs: build
    if: ${{ always() && !cancelled() && startsWith(github.ref, 'refs/tags/desktop-v') }}
    runs-on: ubuntu-latest
    steps:
      - name: Require all platform builds
        if: needs.build.result != 'success'
        run: |
          echo "One or more platform builds failed (needs.build=${{ needs.build.result }})." >&2
          echo "Not publishing a partial draft release." >&2
          exit 1

      - uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Verify release asset set
        run: |
          set -euo pipefail
          echo "Downloaded artifacts:"
          find dist -type f | sort
          # Require at least one asset per shipping platform family.
          test "$(find dist -name '*.dmg' | wc -l)" -ge 2
          test "$(find dist -name '*.msi' | wc -l)" -ge 1
          test "$(find dist -name '*-setup.exe' | wc -l)" -ge 1
          test "$(find dist -name '*.deb' | wc -l)" -ge 1
          test "$(find dist -name '*.rpm' | wc -l)" -ge 1
          test "$(find dist -name '*.AppImage' | wc -l)" -ge 1

      - name: Attach bundles to release
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          fail_on_unmatched_files: true
          files: |
            dist/**/*.dmg
            dist/**/*.deb
            dist/**/*.AppImage
            dist/**/*.rpm
            dist/**/*.msi
            dist/**/*-setup.exe
