name: Desktop app

# Builds downloadable Grok Build Desktop installers (.dmg, .msi/.exe, .deb,
# .AppImage, .rpm) with the grok agent binary bundled inside.
#
# Runs on demand (workflow_dispatch) and on tags shaped like desktop-v*.
# Tag runs additionally publish a draft GitHub release with the bundles.

on:
  workflow_dispatch:
  push:
    tags:
      - "desktop-v*"

permissions:
  contents: write

jobs:
  build:
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: macos-14 # Apple Silicon
            bundles: target/release/bundle/dmg/*.dmg
          - os: macos-13 # Intel
            bundles: target/release/bundle/dmg/*.dmg
          - os: ubuntu-22.04
            bundles: |
              target/release/bundle/deb/*.deb
              target/release/bundle/appimage/*.AppImage
              target/release/bundle/rpm/*.rpm
          - os: windows-latest
            bundles: |
              target/release/bundle/msi/*.msi
              target/release/bundle/nsis/*.exe

    runs-on: ${{ matrix.os }}

    env:
      # True when Apple Developer credentials are configured as repo secrets;
      # gates the signed macOS build path (see desktop/README.md).
      MAC_SIGNING: ${{ secrets.APPLE_SIGNING_IDENTITY != '' }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux system dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libgtk-3-dev \
            librsvg2-dev libsoup-3.0-dev libjavascriptcoregtk-4.1-dev \
            libayatana-appindicator3-dev patchelf

      - name: Install protoc
        uses: arduino/setup-protoc@v3
        with:
          repo-token: ${{ secrets.GITHUB_TOKEN }}

      - uses: Swatinem/rust-cache@v2
        with:
          workspaces: |
            .
            desktop/src-tauri

      - name: Build the grok agent binary
        run: cargo build --release -p xai-grok-pager-bin

      - name: Bundle the agent binary into the app resources
        shell: bash
        run: |
          if [[ "$RUNNER_OS" == "Windows" ]]; then
            cp target/release/xai-grok-pager.exe desktop/src-tauri/resources/bin/grok.exe
          else
            cp target/release/xai-grok-pager desktop/src-tauri/resources/bin/grok
            chmod +x desktop/src-tauri/resources/bin/grok
          fi

      - name: Install Tauri CLI
        run: npm install -g @tauri-apps/cli@^2

      # Two build steps so missing Apple secrets can never break the build:
      # empty signing env vars would make Tauri attempt (and fail) signing.
      - name: Build desktop bundles
        if: runner.os != 'macOS' || env.MAC_SIGNING != 'true'
        working-directory: desktop/src-tauri
        run: tauri build

      - name: Build desktop bundles (signed + notarized)
        if: runner.os == 'macOS' && env.MAC_SIGNING == 'true'
        working-directory: desktop/src-tauri
        run: tauri build
        env:
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}

      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: grok-build-desktop-${{ matrix.os }}
          path: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/macos/*.app.tar.gz
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
          if-no-files-found: warn

      - name: Attach bundles to release
        if: startsWith(github.ref, 'refs/tags/desktop-v')
        uses: softprops/action-gh-release@v2
        with:
          draft: true
          files: |
            desktop/src-tauri/target/release/bundle/dmg/*.dmg
            desktop/src-tauri/target/release/bundle/deb/*.deb
            desktop/src-tauri/target/release/bundle/appimage/*.AppImage
            desktop/src-tauri/target/release/bundle/rpm/*.rpm
            desktop/src-tauri/target/release/bundle/msi/*.msi
            desktop/src-tauri/target/release/bundle/nsis/*.exe
